name: Daily Inventory Snapshot

on:
  schedule:
    # Runs at 05:00 UTC every day. This is 00:00 NY EST (winter) and
    # 01:00 NY EDT (summer) — always AFTER NY midnight, regardless of DST.
    # The RPC create_daily_snapshot defaults to current_ny_date() - 1, so
    # this captures inventory state for "the NY day that just closed".
    # See migration 20260410100000_ny_timezone_helpers.sql for the rationale.
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  trigger-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Edge Function
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/daily-snapshot" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"send_email": true}'
