# Supabase project configuration.
#
# IMPORTANT: This file persists settings that would otherwise be lost on every
# `supabase functions deploy`. The CLI respects these values when deploying.
#
# `project_id` here is the LOCAL identifier — it names the Docker containers
# (e.g. supabase_db_pickd). It must NOT be the production project ref.
# The remote ref lives in supabase/.temp/project-ref (set via `supabase link`).
project_id = "pickd"

# ─── Edge Functions ─────────────────────────────────────────────────────────

# upload-photo: validates JWT internally via supabase.auth.getUser(token).
# Gateway-level JWT verification must be DISABLED so the function can do its
# own auth (otherwise we get 401 at the gateway before our code runs).
# See: supabase/functions/upload-photo/index.ts
[functions.upload-photo]
verify_jwt = false

# cleanup-gallery-trash: triggered by GitHub Actions cron with service role key.
# No user JWT involved; gateway verification can stay enabled.
[functions.cleanup-gallery-trash]
verify_jwt = true

# daily-report-snapshot: triggered by cron, service role auth.
[functions.daily-report-snapshot]
verify_jwt = true

# auto-cancel-orders: triggered by cron, service role auth.
[functions.auto-cancel-orders]
verify_jwt = true

# daily-snapshot: triggered by cron, service role auth.
[functions.daily-snapshot]
verify_jwt = true

# manage-users: validates JWT internally via adminClient.auth.getUser(token)
# and checks admin role. Gateway verification DISABLED (same pattern as
# upload-photo) — otherwise gateway rejects with 401 before function runs.
[functions.manage-users]
verify_jwt = false
